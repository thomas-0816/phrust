[package]
name = "php_vm_cli"
version = "0.0.0"
edition.workspace = true
license.workspace = true
rust-version.workspace = true

[features]
default = []
jit-cranelift = ["dep:php_jit", "php_jit/jit-cranelift", "php_vm/jit-cranelift"]

[[bin]]
name = "php-vm"
path = "src/main.rs"

[[bin]]
name = "phrust-php"
path = "src/bin/phrust_php.rs"

[dependencies]
php_bytecode_cache = { path = "../php_bytecode_cache" }
php_executor = { path = "../php_executor" }
php_ir = { path = "../php_ir" }
php_jit = { path = "../php_jit", optional = true }
php_optimizer = { path = "../php_optimizer" }
php_runtime = { path = "../php_runtime" }
php_semantics = { path = "../php_semantics" }
php_source = { path = "../php_source" }
php_vm = { path = "../php_vm" }

[dev-dependencies]
php_testkit = { path = "../php_testkit" }
