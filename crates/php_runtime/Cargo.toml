[package]
name = "php_runtime"
version = "0.0.0"
edition.workspace = true
license.workspace = true
rust-version.workspace = true

[dependencies]
base64 = "0.22"
crc32fast = "1.4"
getrandom = "0.3"
md-5 = "0.10"
pcre2 = "0.2"
php_lexer = { path = "../php_lexer" }
serde_json = { version = "1", features = ["preserve_order"] }
sha1 = "0.10"

[dev-dependencies]
php_testkit = { path = "../php_testkit" }

[package.metadata.cargo-machete]
ignored = ["md-5"]
