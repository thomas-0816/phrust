[package]
name = "php_runtime"
version = "0.0.0"
edition.workspace = true
license.workspace = true
rust-version.workspace = true

[dependencies]
base64 = "0.22"
blake2b_simd = "1"
bcrypt = "0.17"
crc32fast = "1.4"
ed25519-dalek = "2"
flate2 = "1"
getrandom = "0.3"
image = { version = "0.25", default-features = false, features = ["jpeg", "png"] }
md-5 = "0.10"
mysql = { version = "28", default-features = false, features = ["minimal-rust"] }
native-tls = "0.2"
num-bigint = "0.4"
num-traits = "0.2"
pcre2 = "0.2"
php_diagnostics = { path = "../php_diagnostics", version = "0.0.0" }
php_lexer = { path = "../php_lexer", version = "0.1.0" }
rusqlite = "0.32"
serde_json = { version = "1", features = ["arbitrary_precision", "preserve_order"] }
sha1 = "0.10"
sha2 = "0.10"

[dev-dependencies]
php_testkit = { path = "../php_testkit", version = "0.0.0" }

[package.metadata.cargo-machete]
ignored = ["md-5"]
