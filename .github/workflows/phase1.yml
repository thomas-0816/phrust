name: phase1

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    name: Phase 1 verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v17

      - name: Verify Phase 1
        run: nix develop -c just verify-phase1
