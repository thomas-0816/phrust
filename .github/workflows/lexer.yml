name: lexer

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    name: Lexer verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v17

      - name: Verify lexer
        run: nix develop -c just verify-lexer
